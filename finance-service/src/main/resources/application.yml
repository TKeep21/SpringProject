spring:
  application:
    name: finance-service
  datasource:
    url: ${FINANCE_DB_URL:jdbc:postgresql://localhost:55433/finance_db}
    username: ${FINANCE_DB_USERNAME:finance_user}
    password: ${FINANCE_DB_PASSWORD:finance_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${FINANCE_SERVICE_PORT:8082}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-1234567890}

auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health
