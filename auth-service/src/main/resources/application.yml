spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: auth_user
    password: auth_password
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health
