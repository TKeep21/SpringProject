spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:55432/auth_db}
    username: ${AUTH_DB_USERNAME:auth_user}
    password: ${AUTH_DB_PASSWORD:auth_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${AUTH_SERVICE_PORT:8081}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-1234567890}
  expiration: ${JWT_EXPIRATION:3600000}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN:change-me-internal-service-token}

management:
  endpoints:
    web:
      exposure:
        include: health
